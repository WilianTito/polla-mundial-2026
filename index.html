<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundial 2026 · Familia Tito Vanoni</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --bg4: #30363d;
  --gold: #f5c518;
  --gold2: #e5a000;
  --text: #e6edf3;
  --muted: #8b949e;
  --border: #30363d;
  --green: #2ea043;
  --green2: #238636;
  --red: #da3633;
  --blue: #1f6feb;
  --accent: #f78166;
  --header-bg: linear-gradient(180deg,#1c2128 0%,#0d1117 100%);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* ── HEADER ── */
.top-header {
  background: linear-gradient(135deg, #0d1117 0%, #1c2840 50%, #0d1117 100%);
  border-bottom: 2px solid var(--gold);
  padding: 0;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-area { display: flex; align-items: center; gap: 16px; }
.trophy-icon { font-size: 40px; filter: drop-shadow(0 0 12px rgba(245,197,24,0.5)); }
.logo-text h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(22px,4vw,36px); letter-spacing: 3px;
  background: linear-gradient(90deg, var(--gold), #fff 50%, var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-text p { font-size: 11px; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 2px; }
.header-meta { text-align: right; }
.badge-mundial {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 12px; letter-spacing: 2px; padding: 4px 12px; border-radius: 20px;
  display: inline-block; margin-bottom: 4px;
}
.sync-dot { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
.s-ok { color: #3fb950; } .s-err { color: #f85149; } .s-ing { color: var(--gold); }

/* ── MAIN NAV ── */
.main-nav {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
  max-width: 100%;
}
.main-nav::-webkit-scrollbar { display: none; }
.mnav-btn {
  padding: 12px 20px; border: none; background: none;
  color: var(--muted); cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  border-bottom: 3px solid transparent; white-space: nowrap; transition: all .2s;
}
.mnav-btn:hover { color: var(--text); }
.mnav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── LAYOUT ── */
.page { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* ── FIXTURE VIEW — Group tabs ── */
.group-tabs-bar {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
}
.gtab {
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--muted); cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 13px; letter-spacing: 1px; transition: all .2s;
}
.gtab:hover { border-color: var(--gold); color: var(--gold); }
.gtab.active { background: var(--gold); color: #000; border-color: var(--gold); }

/* ── GROUP CARD ── */
.group-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-bottom: 20px;
}
.group-card-header {
  background: linear-gradient(90deg, #1c2840, #0d1117);
  border-bottom: 1px solid var(--border);
  padding: 12px 18px; display: flex; align-items: center; gap: 12px;
}
.group-letter {
  font-family: 'Bebas Neue', sans-serif; font-size: 40px;
  color: var(--gold); line-height: 1; width: 40px; text-align: center;
}
.group-card-title {
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
  font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
}
.group-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
@media(max-width: 700px) { .group-card-body { grid-template-columns: 1fr; } }

/* ── MATCHES COLUMN ── */
.matches-col { border-right: 1px solid var(--border); }
@media(max-width: 700px) { .matches-col { border-right: none; border-bottom: 1px solid var(--border); } }
.col-header {
  background: var(--bg3); padding: 8px 14px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.jornada-label {
  background: rgba(245,197,24,0.08); border-bottom: 1px solid var(--border);
  padding: 5px 14px; font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--gold2); text-transform: uppercase;
}

/* ── MATCH ROW ── */
.match-row {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 10px 14px; gap: 10px;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  transition: background .15s;
}
.match-row:last-child { border-bottom: none; }
.match-row:hover { background: rgba(245,197,24,0.04); }
.match-row.correct { border-left: 3px solid var(--gold); }
.match-row.winner-ok { border-left: 3px solid var(--green); }
.match-row.wrong { border-left: 3px solid var(--red); }

.team-cell { display: flex; align-items: center; gap: 8px; }
.team-cell.away { flex-direction: row-reverse; }
.tflag { font-size: 22px; line-height: 1; flex-shrink: 0; }
.tname { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 14px; }
.tname.trunc { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.score-cell { text-align: center; flex-shrink: 0; }
.match-num { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
.match-dt { font-size: 10px; color: var(--muted); margin-bottom: 4px; }

/* Score display (result or pending) */
.score-display {
  font-family: 'Bebas Neue', sans-serif; font-size: 28px;
  color: var(--gold); letter-spacing: 2px; min-width: 80px; text-align: center;
}
.score-pending { color: var(--bg4); font-size: 22px; }

/* Score inputs */
.score-inputs { display: flex; align-items: center; gap: 4px; justify-content: center; }
.score-inputs input {
  width: 40px; height: 36px; text-align: center; font-size: 18px;
  font-family: 'Bebas Neue', sans-serif; font-weight: 400;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 0;
  transition: border .15s, box-shadow .15s;
}
.score-inputs input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 2px rgba(245,197,24,0.15); }
.score-inputs input::-webkit-inner-spin-button,
.score-inputs input::-webkit-outer-spin-button { -webkit-appearance: none; }
.score-dash { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--border); }
.pts-badge {
  display: inline-block; margin-top: 3px; padding: 1px 7px; border-radius: 10px;
  font-size: 10px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif;
}
.pts-3 { background: var(--gold); color: #000; }
.pts-1 { background: var(--green); color: #fff; }
.pts-0 { background: var(--red); color: #fff; }

/* ── STANDINGS TABLE ── */
.standings-col { }
.standings-table { width: 100%; border-collapse: collapse; }
.standings-table thead tr {
  background: var(--bg3);
}
.standings-table th {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px;
  font-weight: 700; letter-spacing: 1.5px; color: var(--muted);
  text-transform: uppercase; padding: 8px 10px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.standings-table th.th-team { text-align: left; padding-left: 14px; }
.standings-table tbody tr {
  border-bottom: 1px solid rgba(48,54,61,0.4);
  transition: background .15s;
}
.standings-table tbody tr:hover { background: rgba(245,197,24,0.04); }
.standings-table tbody tr.qualify { border-left: 3px solid var(--green); }
.standings-table tbody tr.qualify2 { border-left: 3px solid #388bfd; }
.standings-table td { padding: 9px 10px; text-align: center; font-size: 13px; }
.standings-table td.td-team { text-align: left; padding-left: 14px; }
.team-in-table { display: flex; align-items: center; gap: 8px; }
.pos-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  color: var(--muted); width: 18px; text-align: center; flex-shrink: 0;
}
.pos-1 { color: var(--gold); }
.pos-2 { color: #58a6ff; }
.pts-col { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); }
.dg-pos { color: #3fb950; }
.dg-neg { color: var(--red); }

/* ── LEADERBOARD ── */
.lb-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.lb-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 20px; display: flex; align-items: center; gap: 16px;
  transition: all .2s; cursor: default;
}
.lb-card:hover { border-color: var(--gold); transform: translateX(3px); }
.lb-card.rank-1 { border-color: var(--gold); background: linear-gradient(135deg, rgba(245,197,24,0.1), var(--bg2)); }
.lb-card.rank-2 { border-color: #8b949e; }
.lb-card.rank-3 { border-color: #cd7f32; }
.lb-rank-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1;
  width: 52px; text-align: center;
}
.r1 { color: var(--gold); } .r2 { color: #8b949e; } .r3 { color: #cd7f32; }
.lb-emoji { font-size: 32px; }
.lb-info { flex: 1; }
.lb-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; }
.lb-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }
.lb-pts-big {
  font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; color: var(--gold);
  text-align: right;
}
.lb-pts-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-align: right; }
.progress-bar { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 2px; transition: width .6s; }

/* ── STAT ROW ── */
.stat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.stat-pill {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 12px; font-size: 12px; color: var(--muted);
}
.stat-pill b { color: var(--text); }
.stat-pill.gold { border-color: var(--gold); color: var(--gold2); }

/* ── ADMIN ── */
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:640px){ .admin-grid { grid-template-columns: 1fr; } }
.admin-match-row {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  padding: 10px 14px; gap: 10px; border-bottom: 1px solid rgba(48,54,61,0.5);
}
.admin-match-row:last-child { border-bottom: none; }
.admin-score-group { display: flex; align-items: center; gap: 6px; justify-content: center; }
.admin-score-group input {
  width: 44px; height: 38px; text-align: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 0; transition: border .15s;
}
.admin-score-group input:focus { border-color: var(--gold); outline: none; }
.admin-score-group input::-webkit-inner-spin-button,
.admin-score-group input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── DIPLOMA ── */
.diploma-wrap {
  background: radial-gradient(ellipse at center, #1e1400 0%, #0d0900 100%);
  border: 3px solid var(--gold); border-radius: 16px; padding: 50px 40px;
  text-align: center; position: relative; overflow: hidden;
}
.diploma-wrap::before {
  content: ''; position: absolute; inset: 10px;
  border: 1px solid rgba(245,197,24,0.3); border-radius: 10px; pointer-events: none;
}
.dip-ornament { font-size: 60px; margin-bottom: 10px; }
.dip-family { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 6px; color: rgba(245,197,24,0.6); text-transform: uppercase; }
.dip-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,6vw,60px); color: var(--gold); letter-spacing: 4px; margin: 8px 0; }
.dip-edition { font-size: 12px; letter-spacing: 5px; color: rgba(245,197,24,0.5); margin-bottom: 30px; font-family: 'Barlow Condensed',sans-serif; }
.dip-avatar { font-size: 70px; margin: 10px 0; }
.dip-winner-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(44px,8vw,72px); color: #fff; letter-spacing: 2px; }
.dip-points { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold2); margin: 6px 0; }
.dip-stars { color: rgba(245,197,24,0.4); font-size: 24px; letter-spacing: 8px; margin: 16px 0; }
.dip-footer { font-family: 'Barlow Condensed',sans-serif; font-size: 11px; letter-spacing: 4px; color: rgba(245,197,24,0.35); text-transform: uppercase; }

/* ── COMMON ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.btn { padding: 8px 18px; border-radius: 7px; border: none; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all .2s; }
.btn-gold { background: linear-gradient(135deg,var(--gold),var(--gold2)); color: #000; }
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,197,24,.35); }
.btn-green { background: var(--green2); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm { padding: 5px 12px; font-size: 11px; }
input.field, select.field {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 7px; padding: 8px 12px; font-family: 'Barlow',sans-serif; font-size: 13px;
  outline: none; transition: border .15s; width: 100%;
}
input.field:focus, select.field:focus { border-color: var(--gold); }
label.lbl { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
.fg { margin-bottom: 14px; }
.flex { display: flex; } .gap-2 { gap: 8px; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
.mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; } .mb-2 { margin-bottom: 8px; } .w-full { width: 100%; }
.text-muted { color: var(--muted); font-size: 13px; }
.alert { padding: 11px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; border: 1px solid; }
.alert-info { background: rgba(31,111,235,.12); border-color: rgba(31,111,235,.3); color: #79c0ff; }
.alert-success { background: rgba(46,160,67,.12); border-color: rgba(46,160,67,.3); color: #56d364; }
.alert-warn { background: rgba(245,197,24,.1); border-color: rgba(245,197,24,.25); color: var(--gold2); }
.admin-badge { background: var(--red); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 1px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(245,197,24,.25); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@media print {
  .top-header, .main-nav, .btn, nav { display: none !important; }
  body { background: white; color: #000; }
  .diploma-wrap { background: white !important; border-color: #000; }
  .dip-title, .dip-winner-name, .dip-points { color: #000; }
  .dip-family, .dip-edition, .dip-stars, .dip-footer { color: #555; }
}
/* Login */
.login-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 14px; }
.login-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
  transition: border-color .2s;
}
.login-card:hover { border-color: rgba(245,197,24,.4); }
.login-name { font-family: 'Barlow Condensed',sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 10px; }
</style>
</head>

// Flag: bloquea syncRead automático mientras hay escrituras pendientes
let _isSaving = false;
let _saveCount = 0; // contador de guardados pendientes

async function syncRead(){
  // NO leer del servidor si hay guardados en curso — evita sobreescribir datos locales
  if(_isSaving){ setSS('ing','↑ Guardando...'); return; }
  if(!SCRIPT_READY){ loadLocal(); setSS('err','⚠ Modo local'); return; }
  try{
    const r=await fetch(SCRIPT_URL+'?action=read&t='+Date.now());
    const remoteData = await r.json();
    // Merge inteligente: el local SIEMPRE gana sobre el remoto para results y predictions
    // Esto evita que un sync sobreescriba lo que acabas de ingresar
    if(remoteData.predictions) {
      // Merge predicciones: local tiene prioridad
      Object.entries(remoteData.predictions).forEach(([pid, preds])=>{
        if(!DB.predictions[pid]) DB.predictions[pid] = preds;
        else {
          Object.entries(preds).forEach(([mid, val])=>{
            if(!DB.predictions[pid][mid]) DB.predictions[pid][mid] = val;
          });
        }
      });
    }
    if(remoteData.results) {
      // Merge resultados: local tiene prioridad (no sobreescribir lo recién ingresado)
      Object.entries(remoteData.results).forEach(([mid, val])=>{
        if(DB.results[mid] === undefined) DB.results[mid] = val;
      });
    }
    if(remoteData.deadline) DB.deadline = remoteData.deadline;
    if(remoteData.phaseDeadlines) DB.phaseDeadlines = {...DB.phaseDeadlines, ...remoteData.phaseDeadlines};
    if(remoteData.phaseTeams && Object.keys(remoteData.phaseTeams).length > 0) {
      // Remote phaseTeams siempre gana — es la fuente de verdad guardada por admin
      DB.phaseTeams = {...DB.phaseTeams, ...remoteData.phaseTeams};
    }
    if(remoteData.phaseDeadlines && Object.keys(remoteData.phaseDeadlines).length > 0) {
      DB.phaseDeadlines = {...DB.phaseDeadlines, ...remoteData.phaseDeadlines};
    }
    if(remoteData.awardPredictions) {
      // Merge award predictions: local tiene prioridad
      Object.entries(remoteData.awardPredictions).forEach(([pid, awards])=>{
        if(!DB.awardPredictions[pid]) DB.awardPredictions[pid] = awards;
        else DB.awardPredictions[pid] = {...awards, ...DB.awardPredictions[pid]};
      });
    }
    if(remoteData.awardResults && Object.keys(remoteData.awardResults).length > 0) {
      DB.awardResults = {...DB.awardResults, ...remoteData.awardResults};
    }
    // Siempre aplicar equipos a ALL_MATCHES después de merge
    applyPhaseTeamsToMatches();
    saveLocal();
    setSS('ok','✓ Sincronizado');
  }catch(e){ loadLocal(); setSS('err','⚠ Sin conexión'); }
}

  _isSaving = true;

    await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p),mode:'no-cors'});
    // Esperar más tiempo para que Apps Script procese antes de releer
    await new Promise(res => setTimeout(res, 3500));

// Aplica los equipos guardados en DB.phaseTeams a los objetos ALL_MATCHES
function applyPhaseTeamsToMatches() {
  Object.entries(DB.phaseTeams).forEach(([mid, t]) => {
    const match = ALL_MATCHES.find(x => x.id === +mid);
    if(match && t.home && t.away) {
      match.home = t.home;
      match.hf   = t.hf  || '';
      match.away = t.away;
      match.af   = t.af  || '';
    }
  });
}

// Convierte 'dt' de formato 'DD/MM HH:MM' (hora Ecuador, año 2026) a Date UTC
// Hora Ecuador = UTC-5, así que sumamos 5 horas para obtener UTC
function parseGroupMatchDate(dt) {
  if(!dt) return null;
  const parts = dt.match(/^(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})$/);
  if(!parts) return null;
  const [,day,month,hour,min] = parts.map(Number);
  // Crear fecha UTC: hora Ecuador + 5h = hora UTC
  const utcHour = hour + 5;
  const d = new Date(Date.UTC(2026, month-1, day, utcHour, min, 0));
  return d;
}

// Obtiene el Date (UTC) de cualquier partido — sea de grupos (dt) o KO (iso)
function getMatchDateTime(m) {
  if(m.iso) return new Date(m.iso);
  if(m.dt) return parseGroupMatchDate(m.dt);
  return null;
}

// Verifica si un partido permite predicción:
// Abierto si tiene equipos válidos Y faltan más de 30 min para el partido (hora Ecuador)
function isMatchOpenForPred(mid) {
  const m = ALL_MATCHES.find(x => x.id === +mid);
  if(!m) return false;

  // Para partidos KO: necesita equipos reales asignados (no placeholders)
  if(+mid > 72) {
    const hasTeams = m.home && m.home.length > 2
      && !m.home.match(/^[WL]\d/)
      && !m.home.match(/^\d[A-L]/)
      && !m.home.match(/^[A-Z]\d[A-Z]/);
    if(!hasTeams) return false;
  }

  // Verificar 30 minutos antes del partido para TODOS los partidos (grupos y KO)
  const matchTime = getMatchDateTime(m);
  if(!matchTime) return false;
  const now = new Date();
  const diffMin = (matchTime - now) / 60000;
  return diffMin > 30;
}

// Retorna texto del countdown para un partido
function getMatchCountdown(mid) {
  const m = ALL_MATCHES.find(x => x.id === +mid);
  if(!m) return '';
  const matchTime = getMatchDateTime(m);
  if(!matchTime) return '';
  const now = new Date();
  const diffMin = Math.floor((matchTime - now) / 60000);
  if(diffMin < 0) return '⚽ En juego o finalizado';
  if(diffMin < 30) return `🔒 Cierra en ${diffMin} min`;
  if(diffMin < 60) return `⚠️ Cierra en ${diffMin} min`;
  const hrs = Math.floor(diffMin/60);
  const mins = diffMin % 60;
  if(hrs < 24) return `⏰ ${hrs}h ${mins}m para el partido`;
  const days = Math.floor(hrs/24);
  return `📅 ${days} día${days>1?'s':''} para el partido`;
}

// SCORING
// ══════════════════════════════════════════════
function wnr(h,a){return h>a?'H':a>h?'A':'D';}
const PHASE_PTS = {
  grupos:        {exact:3, winner:1},
  dieciseisavos: {exact:4, winner:2},
  octavos:       {exact:5, winner:3},
  cuartos:       {exact:6, winner:4},
  semifinales:   {exact:7, winner:5},
  tercero:       {exact:7, winner:5},
  final:         {exact:10,winner:8},
};
function getPhaseKey(mid) {
  mid=+mid;
  if(mid<=72) return 'grupos';
  if(mid<=88) return 'dieciseisavos';
  if(mid<=96) return 'octavos';
  if(mid<=100) return 'cuartos';
  if(mid<=102) return 'semifinales';
  if(mid===103) return 'tercero';
  return 'final';
}
function calcPts(ph,pa,rh,ra,mid){
  if(ph==null||pa==null||rh==null||ra==null)return 0;
  const pts=PHASE_PTS[getPhaseKey(mid)]||PHASE_PTS.grupos;
  if(+ph===+rh&&+pa===+ra)return pts.exact;
  if(wnr(+ph,+pa)===wnr(+rh,+ra))return pts.winner;
  return 0;
}
// Phase status: 'pending_teams' | 'open' | 'closed'
function getPhaseStatus(phaseKey) {
  const now=new Date();
  if(phaseKey==='grupos') return now<new Date(DB.deadline)?'open':'closed';
  const phaseMatchIds = {
    dieciseisavos:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88],
    octavos:[89,90,91,92,93,94,95,96],
    cuartos:[97,98,99,100],
    semifinales:[101,102],
    tercero:[103],
    final:[104]
  };
  const mids = phaseMatchIds[phaseKey]||[];
  // Fase tiene equipos si AL MENOS UN partido tiene equipos reales
  const anyTeamSet = mids.some(id => {
    const m = ALL_MATCHES.find(x=>x.id===id);
    return m && m.home && m.home.length>2
      && !m.home.match(/^[WL]\d/)
      && !m.home.match(/^\d[A-L]/)
      && !m.home.match(/^[A-Z]\d[A-Z]/);
  });
  if(!anyTeamSet) return 'pending_teams';
  // Hay equipos — verificar si aún hay partidos abiertos (>30 min antes)
  const anyOpen = mids.some(id => isMatchOpenForPred(id));
  return anyOpen ? 'open' : 'closed';
}

// Las predicciones de premios especiales cierran cuando inicia el primer
// partido de Semifinales (mismo criterio: 30 min antes)
function getAwardsStatus() {
  const semisIds = [101,102];
  const firstSemi = semisIds
    .map(id => ALL_MATCHES.find(x=>x.id===id))
    .filter(m => m)
    .map(m => getMatchDateTime(m))
    .filter(d => d)
    .sort((a,b)=>a-b)[0];
  if(!firstSemi) return 'open';
  const now = new Date();
  const diffMin = (firstSemi - now) / 60000;
  return diffMin > 30 ? 'open' : 'closed';
}

const AWARD_POINTS = 10; // puntos por cada premio especial acertado

function getAwardPoints(pid) {
  const userAwards = DB.awardPredictions[pid] || {};
  const realAwards = DB.awardResults || {};
  let pts = 0, hits = 0;
  ['mejorJugador','mejorArquero','goleador'].forEach(key=>{
    if(userAwards[key] && realAwards[key] &&
       userAwards[key].trim().toLowerCase() === realAwards[key].trim().toLowerCase()) {
      pts += AWARD_POINTS;
      hits++;
    }
  });
  return {pts, hits};
}

function getStats(pid){
  let pts=0,ex=0,wn=0,wr=0,pend=0;
  const preds=DB.predictions[pid]||{};
  // Count all matches (groups + KO)
  ALL_MATCHES.forEach(m=>{
    const res=DB.results[m.id],pred=preds[m.id];
    if(!res){if(pred)pend++;return;}
    if(!pred){wr++;return;}
    const phKey=getPhaseKey(m.id);
    const p=calcPts(pred.h,pred.a,res.h,res.a,m.id);
    const ptsObj=PHASE_PTS[phKey]||PHASE_PTS.grupos;
    pts+=p;
    if(p===ptsObj.exact)ex++;
    else if(p===ptsObj.winner)wn++;
    else wr++;
  });
  // Sumar puntos de premios especiales
  const awardData = getAwardPoints(pid);
  pts += awardData.pts;
  return {pts,ex,wn,wr,pend,awardPts:awardData.pts,awardHits:awardData.hits};
}
function getLB(){
  return PARTICIPANTS.map(p=>({...p,...getStats(p.id)})).sort((a,b)=>b.pts-a.pts);
}

// Compute standings for a group from results
function computeStandings(grp){
  const g=GROUPS[grp];
  const table={};
  g.teams.forEach(t=>{ table[t]={name:t,pts:0,j:0,g:0,e:0,p:0,gf:0,gc:0}; });
  g.matches.forEach(m=>{
    const res=DB.results[m.id];
    if(!res)return;
    const {h,a}=res;
    const home=m.home, away=m.away;
    if(!table[home]||!table[away])return;
    table[home].j++; table[away].j++;
    table[home].gf+=h; table[home].gc+=a;
    table[away].gf+=a; table[away].gc+=h;
    if(h>a){ table[home].g++;table[home].pts+=3;table[away].p++; }
    else if(a>h){ table[away].g++;table[away].pts+=3;table[home].p++; }
    else{ table[home].e++;table[home].pts+=1;table[away].e++;table[away].pts+=1; }
  });
  return Object.values(table)
    .map(t=>({...t,dg:t.gf-t.gc}))
    .sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

  let groupsHtml='';

        <input type="number" min="0" max="20" value="${pred&&pred.a!=null?pred.a:''}" placeholder="0" onchange="setPred(${m.id},'a',this.value)" style="width:38px;height:32px;font-size:16px">

      else sc=`<div class="score-display score-pending" style="font-size:20px">${pred?`${pred.h}–${pred.a}`:'—'}</div>`;
      mRows+=`<div class="match-row ${cls}" style="padding:8px 12px">
        <div class="team-cell"><span class="tflag" style="font-size:18px">${m.hf}</span><span class="tname" style="font-size:12px">${m.home}</span></div>
        <div class="score-cell">${sc}</div>

      </div>`;

    groupsHtml+=`<div class="group-card" style="margin-bottom:14px">
      <div class="group-card-header" style="padding:8px 14px">
        <div class="group-letter" style="font-size:28px;width:30px">${g.letter}</div>

      </div>

// ── PREMIOS ESPECIALES (Mejor Jugador, Mejor Arquero, Goleador) ──
function renderAwardsSection(pid) {
  const status = getAwardsStatus();
  const userAwards = DB.awardPredictions[pid] || {};
  const realAwards = DB.awardResults || {};

  const AWARDS_LIST = [
    {key:'mejorJugador', label:'⭐ Mejor Jugador del Torneo', icon:'⭐'},
    {key:'mejorArquero', label:'🧤 Mejor Arquero del Torneo', icon:'🧤'},
    {key:'goleador',     label:'⚽ Goleador del Torneo', icon:'⚽'},
  ];

  let bannerHtml = '';
  if(status === 'open') {
    bannerHtml = `<div class="alert alert-info">🌟 <strong>Premios Especiales</strong> · Puedes predecir hasta 30 min antes de iniciar Semifinales · Cada acierto = <strong>${AWARD_POINTS} puntos</strong></div>`;
  } else {
    bannerHtml = `<div class="alert alert-warn">🔒 Las predicciones de premios especiales están cerradas (inició Semifinales).</div>`;
  }

  let awardsHtml = AWARDS_LIST.map(a => {
    const userPick = userAwards[a.key] || '';
    const realPick = realAwards[a.key] || '';
    const isCorrect = realPick && userPick && userPick.trim().toLowerCase() === realPick.trim().toLowerCase();
    let rowCls = '';
    if(realPick) rowCls = isCorrect ? 'correct' : (userPick ? 'wrong' : '');

    return `<div class="match-row ${rowCls}" style="grid-template-columns:1fr;padding:12px 16px">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;margin-bottom:6px">${a.label}</div>
        ${status==='open' ? `
          <input class="field" placeholder="Nombre del jugador" value="${userPick}"
            onchange="setAwardPred('${a.key}',this.value)">
        ` : `
          <div style="font-size:14px;color:var(--text)">${userPick || '<span style="color:var(--muted)">Sin predicción</span>'}</div>
        `}
        ${realPick ? `<div style="margin-top:6px;font-size:12px;color:var(--muted)">Ganador real: <strong style="color:var(--gold)">${realPick}</strong> ${isCorrect?`<span class="pts-badge pts-3" style="margin-left:6px">+${AWARD_POINTS} pts</span>`:''}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="group-card" style="margin-bottom:16px">
    <div class="group-card-header">
      <div class="group-letter" style="font-size:28px;width:auto;padding-right:8px">🌟</div>
      <div>
        <div class="group-card-title">Premios Especiales</div>
        <div class="text-muted" style="font-size:12px">+${AWARD_POINTS} pts por cada acierto</div>
      </div>
    </div>
    <div style="padding:14px 0">
      <div style="padding:0 16px 12px">${bannerHtml}</div>
      ${awardsHtml}
    </div>
  </div>`;
}

// VIEW: LEADERBOARD
// ══════════════════════════════════════════════
function vLeaderboard(){
  const lb=getLB();
  // Usar ALL_MATCHES (104 partidos totales) en vez de solo grupos (72)
  const totalMatches = ALL_MATCHES.length;
  const played = ALL_MATCHES.filter(m=>DB.results[m.id]).length;
  const rnkEmoji=['🥇','🥈','🥉','4️⃣','5️⃣'];

  // Calcular puntos acumulados por fase para cada participante
  function getPhasePointsForUser(pid, phaseKey) {
    const preds = DB.predictions[pid] || {};
    let pts = 0;
    ALL_MATCHES.forEach(m=>{
      if(getPhaseKey(m.id) !== phaseKey) return;
      const res = DB.results[m.id], pred = preds[m.id];
      if(!res || !pred) return;
      pts += calcPts(pred.h, pred.a, res.h, res.a, m.id);
    });
    return pts;
  }

  // Construir el resumen de líderes por fase (quién lleva más puntos en cada una)
  const phaseKeys = ['grupos','dieciseisavos','octavos','cuartos','semifinales','final'];
  const phasePointsTable = {};
  phaseKeys.forEach(pk => {
    phasePointsTable[pk] = PARTICIPANTS.map(p => ({
      id:p.id, name:p.name, emoji:p.emoji, color:p.color,
      pts: getPhasePointsForUser(p.id, pk === 'semifinales' ? 'semifinales' : pk)
    }));
    // Para "Semis/3er" sumar también tercero
    if(pk === 'semifinales') {
      phasePointsTable[pk].forEach(u => {
        u.pts += getPhasePointsForUser(u.id, 'tercero');
      });
    }
  });

  function renderPhaseUserPoints(phaseKey) {
    const users = [...phasePointsTable[phaseKey]].sort((a,b)=>b.pts-a.pts);
    return users.map(u => `<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;color:${u.pts>0?'var(--text)':'var(--muted)'}">
      <span>${u.emoji} ${u.name}</span><span style="font-weight:${u.pts>0?'700':'400'};color:${u.pts>0?'var(--gold)':'var(--muted)'}">${u.pts}</span>
    </div>`).join('');
  }

  return `<div class="card">
    <div class="card-title">🏅 Clasificación General</div>
    <div class="stat-row">
      <div class="stat-pill">⚽ Partidos: <b>${played}/${totalMatches}</b></div>
      <div class="stat-pill">📅 Cierre polla: <b>${new Date(DB.deadline).toLocaleDateString('es-EC')}</b></div>
      <div class="stat-pill gold">🌟 Premios = <b>${AWARD_POINTS}pts</b> c/u</div>
    </div>
    <div class="progress-bar mt-2" style="height:6px"><div class="progress-fill" style="width:${Math.round(played/totalMatches*100)}%"></div></div>
    <div class="text-muted mt-2" style="font-size:11px">${Math.round(played/totalMatches*100)}% del Mundial completado (${played}/${totalMatches} partidos) · 11 Jun – 19 Jul 2026</div>
  </div>
  <div class="card" style="padding:14px 18px">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;color:var(--gold);margin-bottom:10px;text-transform:uppercase">📊 Puntos por Fase (Exacto / Ganador)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px">
      <div style="background:var(--bg3);border-radius:8px;padding:8px">
        <div style="text-align:center;margin-bottom:6px"><div style="font-size:10px;color:var(--muted)">Grupos</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">3 / 1</div></div>
        <div style="border-top:1px solid var(--border);padding-top:6px">${renderPhaseUserPoints('grupos')}</div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:8px">
        <div style="text-align:center;margin-bottom:6px"><div style="font-size:10px;color:var(--muted)">Dieciseisavos</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">4 / 2</div></div>
        <div style="border-top:1px solid var(--border);padding-top:6px">${renderPhaseUserPoints('dieciseisavos')}</div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:8px">
        <div style="text-align:center;margin-bottom:6px"><div style="font-size:10px;color:var(--muted)">Octavos</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">5 / 3</div></div>
        <div style="border-top:1px solid var(--border);padding-top:6px">${renderPhaseUserPoints('octavos')}</div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:8px">
        <div style="text-align:center;margin-bottom:6px"><div style="font-size:10px;color:var(--muted)">Cuartos</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">6 / 4</div></div>
        <div style="border-top:1px solid var(--border);padding-top:6px">${renderPhaseUserPoints('cuartos')}</div>
      </div>
      <div style="background:var(--bg3);border-radius:8px;padding:8px">
        <div style="text-align:center;margin-bottom:6px"><div style="font-size:10px;color:var(--muted)">Semis / 3er</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">7 / 5</div></div>
        <div style="border-top:1px solid var(--border);padding-top:6px">${renderPhaseUserPoints('semifinales')}</div>
      </div>
      <div style="background:linear-gradient(135deg,rgba(245,197,24,.15),var(--bg3));border:1px solid var(--gold);border-radius:8px;padding:8px">
        <div style="text-align:center;margin-bottom:6px"><div style="font-size:10px;color:var(--gold2)">🏆 Final</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">10 / 8</div></div>
        <div style="border-top:1px solid rgba(245,197,24,.3);padding-top:6px">${renderPhaseUserPoints('final')}</div>
      </div>
    </div>
    <div style="margin-top:10px;padding:8px;background:rgba(245,197,24,.08);border-radius:8px;font-size:11px;color:var(--gold2)">🌟 Premios Especiales (Mejor Jugador, Arquero, Goleador): <b>${AWARD_POINTS} pts</b> cada acierto · Cierran 30 min antes de Semifinales</div>
  </div>
  <div class="lb-grid">
  ${lb.map((p,i)=>`<div class="lb-card rank-${i+1}" onclick="loggedPid='${p.id}';goView('fixture')">
    <div class="lb-rank-num r${i+1}">${i+1}</div>
    <div class="lb-emoji">${rnkEmoji[i]||''}</div>
    <div class="lb-info">
      <div class="lb-name" style="color:${p.color}">${p.emoji} ${p.name}</div>
      <div class="lb-detail">✅ ${p.ex} exactos · 🟡 ${p.wn} ganador · ❌ ${p.wr} fallos · 🌟 ${p.awardHits}/3 premios (+${p.awardPts}pts)</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,p.pts*1.5)}%"></div></div>
    </div>
    <div>
      <div class="lb-pts-big">${p.pts}</div>
      <div class="lb-pts-label">PUNTOS</div>

    </div>
  </div>`).join('')}
  </div>`;
}

    {key:'tercero',       name:'3er y 4to Lugar', ids:[103]},
    {key:'final',         name:'Gran Final', ids:[104]},
  ];

  let koHtml = '';
  KO_PHASES.forEach(ph => {
    const status = getPhaseStatus(ph.key);
    const dl = DB.phaseDeadlines[ph.key] || '';
    const statusLabel = status==='pending_teams'?'⚙️ Pendiente asignar equipos': status==='open'?'✅ Abierta para predicciones':'🔒 Cerrada';
    const statusColor = status==='pending_teams'?'var(--muted)': status==='open'?'var(--green)':'var(--red)';

    let sortedIds = [...ph.ids].sort((a,b) => {
      const ma = ALL_MATCHES.find(x=>x.id===a);
      const mb = ALL_MATCHES.find(x=>x.id===b);
      const ta = ma ? getMatchDateTime(ma) : null;
      const tb = mb ? getMatchDateTime(mb) : null;
      if(!ta || !tb) return a-b;
      return ta - tb;
    });
    let matchRows = sortedIds.map(mid => {
      const m = ALL_MATCHES.find(x=>x.id===mid);
      const res = DB.results[mid];
      const teams = DB.phaseTeams[mid] || {};
      const hasTeams = m && m.home && m.home.length>3 && !m.home.match(/^[WL]\d/) && !m.home.match(/^\d[A-L]/);

      return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Partido #${mid} · ${m?(m.dt||m.fecha)+(m.hora?' '+m.hora+' ECT':''):'TBD'} ${m&&m.iso?'· '+getMatchCountdown(mid):''}</div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px">
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">LOCAL</div>
            <input class="field" style="font-size:13px" id="th_${mid}" placeholder="Ej: Argentina" value="${hasTeams?m.home:''}" onchange="updateTeamName(${mid},'home',this.value)">
            <input class="field" style="font-size:11px;margin-top:4px" id="thf_${mid}" placeholder="🇦🇷 bandera emoji" value="${hasTeams?m.hf:''}" onchange="updateTeamName(${mid},'hf',this.value)">
          </div>
          <div style="text-align:center;color:var(--muted);font-size:20px;font-weight:bold">vs</div>
          <div>
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">VISITANTE</div>
            <input class="field" style="font-size:13px" id="ta_${mid}" placeholder="Ej: Brasil" value="${hasTeams?m.away:''}" onchange="updateTeamName(${mid},'away',this.value)">
            <input class="field" style="font-size:11px;margin-top:4px" id="taf_${mid}" placeholder="🇧🇷 bandera emoji" value="${hasTeams?m.af:''}" onchange="updateTeamName(${mid},'af',this.value)">
          </div>
        </div>
        <button class="btn btn-gold btn-sm" onclick="savePhaseTeams(${mid})">💾 Guardar Equipos</button>
        ${hasTeams ? `<span style="margin-left:8px;color:var(--green);font-size:11px">✅ ${m.home} vs ${m.away}</span>` : ''}
        ${hasTeams && res!=null ? `<span style="margin-left:8px;color:var(--muted);font-size:11px">Resultado: ${res.h}–${res.a}</span>` : ''}
      </div>`;
    }).join('');

    koHtml += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden">
      <div style="background:linear-gradient(90deg,#1c2840,#0d1117);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase">${ph.name}</div>
          <div style="font-size:11px;margin-top:2px;color:${statusColor}">${statusLabel}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--gold2)">🔒 Cierre automático</div>
          <div style="font-size:10px;color:var(--muted)">30 min antes de cada partido</div>
          <div style="font-size:10px;color:var(--muted)">Hora Ecuador (ECT)</div>
        </div>
      </div>
      <div style="padding:14px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;padding:8px;background:rgba(31,111,235,0.1);border-radius:6px;border:1px solid rgba(31,111,235,0.2)">
          💡 <strong>Flujo:</strong> 1) Ingresa los equipos clasificados en cada partido · 2) Los participantes pueden predecir automáticamente · 3) La predicción se cierra 30 min antes de cada partido · 4) Ingresa los resultados cuando terminen
        </div>
        ${matchRows}
      </div>
    </div>`;
  });

  return adminGroupsHtml + `<div class="card" style="margin-top:20px">
    <div class="card-title">🏆 Gestión Fases Eliminatorias</div>
    <div class="alert alert-info mb-2">Aquí asignas los equipos clasificados a cada llave y defines cuándo cierra la predicción de esa fase (recomendado: 12 horas antes del primer partido).</div>
    ${koHtml}
  </div>` + renderAwardsAdmin();

}

function renderAwardsAdmin() {
  const status = getAwardsStatus();
  const statusLabel = status==='open' ? '✅ Abierto para predicciones' : '🔒 Cerrado (Semifinales ya inició)';
  const statusColor = status==='open' ? 'var(--green)' : 'var(--red)';
  const realAwards = DB.awardResults || {};

  const AWARDS_LIST = [
    {key:'mejorJugador', label:'⭐ Mejor Jugador del Torneo'},
    {key:'mejorArquero', label:'🧤 Mejor Arquero del Torneo'},
    {key:'goleador',     label:'⚽ Goleador del Torneo'},
  ];

  const rows = AWARDS_LIST.map(a => `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">${a.label}</div>
      <div class="flex gap-2">
        <input class="field" id="award_${a.key}" placeholder="Nombre del ganador real" value="${realAwards[a.key]||''}" style="flex:1">
        <button class="btn btn-gold btn-sm" onclick="saveAwardResult('${a.key}')">💾 Guardar</button>

  return `<div class="card" style="margin-top:20px">

    <div class="alert alert-info mb-2">Los participantes predicen estos 3 premios hasta 30 min antes de Semifinales. Ingresa aquí el ganador real de cada uno cuando se confirme (normalmente al final del torneo). Cada acierto otorga <strong>${AWARD_POINTS} puntos</strong>.</div>

}

// HANDLERS
// ══════════════════════════════════════════════
function doLogin(pid){
  const pw=document.getElementById('pw_'+pid)?.value;
  const p=PARTICIPANTS.find(x=>x.id===pid);
  if(!pw||!p)return;
  if(pw===p.pass){ loggedPid=pid; render(); }
  else {
    const el=document.getElementById('pwerr_'+pid);
    if(el){el.style.display='block';setTimeout(()=>{el.style.display='none';},2500);}
  }
}
function doAdminLogin(){
  if(document.getElementById('apinInput')?.value===ADMIN_PIN){adminOk=true;render();}
  else alert('PIN incorrecto');
}
function setPred(mid,side,val){
  if(!isMatchOpenForPred(mid)){
    alert('⏰ Este partido ya cerró sus predicciones (30 min antes del inicio).');
    render();
    return;
  }
  if(!DB.predictions[loggedPid])DB.predictions[loggedPid]={};
  if(!DB.predictions[loggedPid][mid])DB.predictions[loggedPid][mid]={h:null,a:null};
  const n=parseInt(val);
  DB.predictions[loggedPid][mid][side]=isNaN(n)?null:Math.max(0,Math.min(20,n));
  saveLocal(); setSS('ing','↑ Guardando...');
  clearTimeout(window._st);
  window._st=setTimeout(()=>{
    syncWrite({action:'savePred',pid:loggedPid,predictions:DB.predictions[loggedPid]});
  },1200);
}
function setAwardPred(key, val) {
  if(getAwardsStatus() !== 'open') {
    alert('⏰ Las predicciones de premios especiales ya cerraron (inició Semifinales).');
    render();
    return;
  }
  if(!DB.awardPredictions[loggedPid]) DB.awardPredictions[loggedPid] = {};
  DB.awardPredictions[loggedPid][key] = val.trim();
  saveLocal(); setSS('ing','↑ Guardando...');
  clearTimeout(window._sa);
  window._sa = setTimeout(()=>{
    syncWrite({action:'saveAwardPred', pid:loggedPid, awards:DB.awardPredictions[loggedPid]});
  }, 1200);
}
function doSaveRes(mid){
  const hEl=document.getElementById('ah_'+mid);
  const aEl=document.getElementById('aa_'+mid);
  const h=parseInt(hEl?.value);
  const a=parseInt(aEl?.value);
  if(isNaN(h)||isNaN(a)){alert('⚠️ Ingresa ambos marcadores (local y visitante)');return;}
  // Guardar en estado local inmediatamente
  DB.results[mid]={h,a};
  saveLocal();
  // Mostrar confirmación visual en el botón sin hacer render() completo
  const btn=document.getElementById('savebtn_'+mid);
  if(btn){ btn.textContent='✅'; btn.style.background='#2ea043'; btn.disabled=true;
    setTimeout(()=>{ if(btn){ btn.textContent='💾 Guardar'; btn.style.background=''; btn.disabled=false; } }, 3000);
  }
  // Marcar inputs en verde para confirmación visual
  if(hEl){ hEl.style.borderColor='#2ea043'; setTimeout(()=>{if(hEl)hEl.style.borderColor='';},3000); }
  if(aEl){ aEl.style.borderColor='#2ea043'; setTimeout(()=>{if(aEl)aEl.style.borderColor='';},3000); }
  // Enviar al servidor en background SIN hacer render()
  syncWrite({action:'saveResult',mid,h,a}).then(()=>{
    // Solo re-render después de confirmar guardado, sin interrumpir inputs activos
    const activeEl = document.activeElement;
    if(!activeEl || !activeEl.type || activeEl.type !== 'number') render();
  });
}
function doClearRes(mid){
  if(!confirm('¿Eliminar este resultado?')) return;
  delete DB.results[mid];
  saveLocal();
  syncWrite({action:'clearResult',mid});
  render();
}
function doSaveConfig(){
  syncWrite({action:'saveConfig',deadline:DB.deadline});
  alert('✅ Configuración guardada');render();
}
function saveAwardResult(key) {
  const val = document.getElementById('award_'+key)?.value?.trim();
  if(!val) { alert('Ingresa un nombre'); return; }
  if(!DB.awardResults) DB.awardResults = {};
  DB.awardResults[key] = val;
  saveLocal();
  syncWrite({action:'saveAwardResult', key, value:val});
  alert('✅ Guardado: '+val);
  render();
}
async function showDiagnostic(){
  const panel=document.getElementById('diagPanel');
  if(!panel) return;
  panel.style.display='block';
  panel.innerHTML='Consultando servidor...';
  let serverData = {};
  try{
    const r=await fetch(SCRIPT_URL+'?action=read&t='+Date.now());
    serverData = await r.json();
  }catch(e){
    panel.innerHTML='❌ ERROR al conectar con Apps Script: '+e.message;
    return;
  }
  const localTeams = DB.phaseTeams;
  const serverTeams = serverData.phaseTeams || {};
  let html = '=== DIAGNÓSTICO DE SINCRONIZACIÓN ===\n\n';
  html += 'SCRIPT_URL configurado: '+(SCRIPT_READY?'SÍ':'NO ⚠️')+'\n';
  html += 'URL: '+SCRIPT_URL.substring(0,60)+'...\n\n';
  html += '--- EQUIPOS EN ESTE NAVEGADOR (local) ---\n';
  html += Object.keys(localTeams).length+' equipos guardados localmente\n';
  Object.entries(localTeams).forEach(([mid,t])=>{
    html += `  #${mid}: ${t.home} vs ${t.away}\n`;
  });
  html += '\n--- EQUIPOS EN EL SERVIDOR (Google Sheets) ---\n';
  html += Object.keys(serverTeams).length+' equipos guardados en el servidor\n';
  Object.entries(serverTeams).forEach(([mid,t])=>{
    html += `  #${mid}: ${t.home} vs ${t.away}\n`;
  });
  html += '\n--- DIAGNÓSTICO ---\n';
  if(Object.keys(localTeams).length > 0 && Object.keys(serverTeams).length === 0){
    html += '⚠️ PROBLEMA DETECTADO: Tienes equipos guardados en ESTE navegador\n';
    html += 'pero el servidor (Google Sheets) está VACÍO.\n\n';
    html += 'Esto significa que tu Apps Script no tiene actualizada\n';
    html += 'la función "savePhaseTeams". Debes actualizar el código\n';
    html += 'del Apps Script con la versión que incluye ese manejo.\n';
  } else if(Object.keys(serverTeams).length > 0){
    html += '✅ El servidor SÍ tiene equipos guardados.\n';
    html += 'Si en otro dispositivo no los ves, prueba "🔄 Sincronizar"\n';
    html += 'o recarga la página completamente (Ctrl+Shift+R).\n';
  } else {
    html += 'ℹ️ No hay equipos guardados ni local ni en el servidor.\n';
  }
  panel.innerHTML = '<pre style="white-space:pre-wrap;margin:0">'+html+'</pre>';
}
function printPolla(pid){
  const p=PARTICIPANTS.find(x=>x.id===pid);
  const preds=DB.predictions[pid]||{},stats=getStats(pid);
  let allM=[]; Object.values(GROUPS).forEach(g=>allM.push(...g.matches));
  const rows=allM.map(m=>{
    const pred=preds[m.id],res=DB.results[m.id];
    const pts=res&&pred?calcPts(pred.h,pred.a,res.h,res.a,m.id):'—';
    const c=pts===3?'#d97706':pts===1?'#16a34a':pts===0?'#dc2626':'';
    return `<tr><td>#${m.id}</td><td>${m.jor||''}</td><td>${m.hf} ${m.home}</td><td>${m.af} ${m.away}</td><td>${m.dt||''}</td><td style="font-weight:bold">${pred?`${pred.h} – ${pred.a}`:'—'}</td><td>${res?`${res.h}–${res.a}`:'—'}</td><td style="color:${c};font-weight:bold">${pts}</td></tr>`;
  }).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Polla ${p.name}</title>
  <style>body{font-family:Arial,sans-serif;padding:20px;font-size:11px;}.hdr{background:#0d1117;color:#f5c518;padding:16px;text-align:center;border-radius:8px;margin-bottom:14px;}h1{font-size:20px;margin:0;}h2{font-size:12px;color:#888;margin:3px 0 0;}.stats{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;}.stat{background:#f5f5f5;padding:6px 12px;border-radius:6px;text-align:center;}.stat b{display:block;font-size:18px;color:#c8a200;}table{width:100%;border-collapse:collapse;font-size:10px;}th{background:#0d1117;color:#f5c518;padding:6px;text-align:left;}td{padding:4px 6px;border-bottom:1px solid #eee;}tr:nth-child(even){background:#f9f9f9;}.foot{text-align:center;margin-top:14px;font-size:9px;color:#999;}</style>
  </head><body><div class="hdr"><h1>🏆 POLLA MUNDIAL FIFA 2026</h1><h2>FAMILIA TITO VANONI · ${p.emoji} ${p.name.toUpperCase()} · ${new Date().toLocaleDateString('es-EC')}</h2></div>
  <div class="stats"><div class="stat"><b>${stats.pts}</b>Puntos</div><div class="stat"><b>${stats.ex}</b>✅ Exactos</div><div class="stat"><b>${stats.wn}</b>🟡 Ganador</div><div class="stat"><b>${stats.wr}</b>❌ Fallos</div></div>
  <table><tr><th>#</th><th>Jor.</th><th>Local</th><th>Visitante</th><th>Fecha/Hora</th><th>Pronóstico</th><th>Resultado</th><th>Pts</th></tr>${rows}</table>
  <div class="foot">Polla Mundialista Familia Tito Vanoni · FIFA World Cup 2026 · USA · Canadá · México</div>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

// ══ KO PHASE HANDLERS ══
function updateTeamName(mid, side, val) {
  if(!DB.phaseTeams[mid]) DB.phaseTeams[mid] = {};
  DB.phaseTeams[mid][side] = val;
}

function savePhaseTeams(mid) {
  const home = document.getElementById('th_'+mid)?.value?.trim();
  const hf   = document.getElementById('thf_'+mid)?.value?.trim();
  const away = document.getElementById('ta_'+mid)?.value?.trim();
  const af   = document.getElementById('taf_'+mid)?.value?.trim();
  if(!home || !away) { alert('Ingresa ambos equipos'); return; }
  // Update local match
  const match = ALL_MATCHES.find(x=>x.id===+mid);
  // Save to DB first
  DB.phaseTeams[mid] = {home, hf:hf||'', away, af:af||''};
  // Apply ALL phaseTeams to matches (not just this one)
  applyPhaseTeamsToMatches();
  saveLocal();
  syncWrite({action:'savePhaseTeams', mid, home, hf:hf||'', away, af:af||''});
  // Visual feedback
  const btn = event?.target;
  if(btn){ const orig=btn.textContent; btn.textContent='✅ Guardado'; btn.disabled=true;
    setTimeout(()=>{ btn.textContent=orig; btn.disabled=false; render(); },2000); }
}

function savePhaseDeadline(phaseKey, val) {
  const dl = val + ':00';
  DB.phaseDeadlines[phaseKey] = dl;
  saveLocal();
  syncWrite({action:'savePhaseDeadline', phaseKey, deadline: dl});
  setSS('ing','↑ Guardando deadline...');
}

// ══ INIT ══
async function init(){
  await syncRead();
  render();
  // Auto-sync cada 90 segundos, pero solo si no hay guardados en curso
  setInterval(async()=>{
    if(!_isSaving){
      await syncRead();
      // Solo re-render si no hay inputs activos (admin ingresando datos)
      const activeEl = document.activeElement;
      if(!activeEl || !activeEl.type || activeEl.type !== 'number') render();
    }
  }, 90000);
}
init();
